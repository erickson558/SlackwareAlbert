name: Release On Main Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build project
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Read version
        id: read_version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release zip
        run: |
          cd dist
          zip -r ../SlackwareAlbert-${{ steps.read_version.outputs.version }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.read_version.outputs.version }}
          name: SlackwareAlbert ${{ steps.read_version.outputs.version }}
          generate_release_notes: true
          files: |
            SlackwareAlbert-${{ steps.read_version.outputs.version }}.zip
